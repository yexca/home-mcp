server:
  host: 127.0.0.1
  port: 8787

artifacts:
  root: ./tmp/test-artifacts
  public_base_url: http://127.0.0.1:8787/artifacts
  max_artifact_bytes: 1048576

database:
  path: ./tmp/test-artifacts/metadata.sqlite3

callers:
  host_assistant:
    role: admin
    token: test-host-token
    shared_artifact_read: true
  role_default:
    role: role_play
    token: test-role-token
    shared_artifact_read: false

modules:
  image:
    enabled: false
