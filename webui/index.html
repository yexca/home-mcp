<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>home_mcp_gateway WebUI</title>
    <link rel="stylesheet" href="/webui/app.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Modules">
        <div class="brand">
          <span class="brand-mark">M</span>
          <div>
            <strong>home_mcp</strong>
            <span id="brandSubtitle">gateway console</span>
          </div>
        </div>
        <nav id="sidebarNav" class="nav-list"></nav>
      </aside>

      <div class="workspace">
        <header class="header">
          <div>
            <p id="pageKicker" class="kicker">Dashboard</p>
            <h1 id="pageTitle">控制台</h1>
          </div>
          <div class="header-actions">
            <span id="runtimeBadge" class="status-pill muted"></span>
            <select id="themeSelect" class="select" aria-label="Theme">
              <option value="system"></option>
              <option value="light"></option>
              <option value="dark"></option>
            </select>
            <select id="languageSelect" class="select" aria-label="Language">
              <option value="zh-CN">简体中文</option>
              <option value="en">English</option>
            </select>
          </div>
        </header>

        <main class="main">
          <section id="authPanel" class="auth-strip">
            <label class="field auth-field">
              <span id="adminTokenLabel">Admin Token <b>*</b></span>
              <input id="adminToken" type="password" autocomplete="current-password" required />
            </label>
            <button id="loadStatus" type="button"></button>
          </section>

          <section id="message" class="message" hidden></section>
          <form id="configForm" novalidate>
            <div id="pageMount"></div>
          </form>
        </main>

        <footer class="footer">
          <span id="snapshotInfo">WebUI snapshot: -</span>
          <span id="dirtyInfo"></span>
        </footer>
      </div>
    </div>
    <script src="/webui/app.js"></script>
  </body>
</html>
