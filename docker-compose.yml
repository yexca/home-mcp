services:
  home-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    image: yexca/home-mcp-gateway:0.2.2
    container_name: home-mcp-gateway
    ports:
      - "8787:8787"
    volumes:
      - ./config:/app/config
      - ./artifacts:/app/artifacts
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import json, urllib.request; data=json.load(urllib.request.urlopen('http://127.0.0.1:8787/healthz', timeout=3)); raise SystemExit(0 if data.get('ok') else 1)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  home-ai-net:
    external: true
