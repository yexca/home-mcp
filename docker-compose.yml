services:
  home-mcp:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    image: home-mcp-gateway:0.1.1
    container_name: home-mcp-gateway
    environment:
      GATEWAY_TOKEN_HOST: ${GATEWAY_TOKEN_HOST:-}
      GATEWAY_TOKEN_ROLE_DEFAULT: ${GATEWAY_TOKEN_ROLE_DEFAULT:-}
      ARTIFACT_SIGNING_SECRET: ${ARTIFACT_SIGNING_SECRET:-}
      SERVER_HOST: ${SERVER_HOST:-0.0.0.0}
      SERVER_PORT: ${SERVER_PORT:-8787}
      ARTIFACT_ROOT: ${ARTIFACT_ROOT:-./artifacts}
      ARTIFACT_PUBLIC_BASE_URL: ${ARTIFACT_PUBLIC_BASE_URL:-http://127.0.0.1:8787/artifacts}
      ARTIFACT_SIGNED_URL_TTL_SECONDS: ${ARTIFACT_SIGNED_URL_TTL_SECONDS:-300}
      MAX_ARTIFACT_BYTES: ${MAX_ARTIFACT_BYTES:-52428800}
      MAX_INLINE_ARTIFACT_BYTES: ${MAX_INLINE_ARTIFACT_BYTES:-5242880}
      DATABASE_PATH: ${DATABASE_PATH:-./artifacts/metadata.sqlite3}
      DATABASE_BUSY_TIMEOUT_MS: ${DATABASE_BUSY_TIMEOUT_MS:-5000}
      SYNC_TOOL_TIMEOUT_SECONDS: ${SYNC_TOOL_TIMEOUT_SECONDS:-120}
      IMAGE_JOBS_PER_CALLER_PER_DAY: ${IMAGE_JOBS_PER_CALLER_PER_DAY:-20}
      TTS_JOBS_PER_CALLER_PER_DAY: ${TTS_JOBS_PER_CALLER_PER_DAY:-100}
      PRINT_JOBS_PER_CALLER_PER_DAY: ${PRINT_JOBS_PER_CALLER_PER_DAY:-20}
      MAX_IMAGE_JOBS_GLOBAL: ${MAX_IMAGE_JOBS_GLOBAL:-2}
      MAX_IMAGE_JOBS_PER_CALLER: ${MAX_IMAGE_JOBS_PER_CALLER:-1}
      MAX_TTS_JOBS_GLOBAL: ${MAX_TTS_JOBS_GLOBAL:-2}
      MATRIX_MESSAGES_PER_ROOM_PER_MINUTE: ${MATRIX_MESSAGES_PER_ROOM_PER_MINUTE:-5}
      MAX_PRINT_JOBS_GLOBAL: ${MAX_PRINT_JOBS_GLOBAL:-1}
      IMAGE_API_BASE_URL: ${IMAGE_API_BASE_URL:-}
      IMAGE_API_MODEL: ${IMAGE_API_MODEL:-}
      IMAGE_API_KEY: ${IMAGE_API_KEY:-}
      IMAGE_TOTAL_TIMEOUT_SECONDS: ${IMAGE_TOTAL_TIMEOUT_SECONDS:-600}
      IMAGE_STALE_JOB_GRACE_SECONDS: ${IMAGE_STALE_JOB_GRACE_SECONDS:-30}
      IMAGE_PROVIDER_TIMEOUT_SECONDS: ${IMAGE_PROVIDER_TIMEOUT_SECONDS:-60}
      IMAGE_MAX_DOWNLOAD_BYTES: ${IMAGE_MAX_DOWNLOAD_BYTES:-10485760}
      IMAGE_MAX_EDIT_INPUT_IMAGES: ${IMAGE_MAX_EDIT_INPUT_IMAGES:-4}
      IMAGE_MAX_EDIT_INPUT_IMAGE_BYTES: ${IMAGE_MAX_EDIT_INPUT_IMAGE_BYTES:-10485760}
      IMAGE_MAX_EDIT_TOTAL_IMAGE_BYTES: ${IMAGE_MAX_EDIT_TOTAL_IMAGE_BYTES:-20971520}
      LOCAL_IMAGE_DEFAULT_SIZE: ${LOCAL_IMAGE_DEFAULT_SIZE:-}
      LOCAL_IMAGE_DEFAULT_QUALITY: ${LOCAL_IMAGE_DEFAULT_QUALITY:-}
      LOCAL_IMAGE_DEFAULT_STYLE: ${LOCAL_IMAGE_DEFAULT_STYLE:-}
      LOCAL_IMAGE_DEFAULT_OUTPUT_FORMAT: ${LOCAL_IMAGE_DEFAULT_OUTPUT_FORMAT:-}
      LOCAL_IMAGE_TOTAL_TIMEOUT_SECONDS: ${LOCAL_IMAGE_TOTAL_TIMEOUT_SECONDS:-900}
      LOCAL_IMAGE_STALE_JOB_GRACE_SECONDS: ${LOCAL_IMAGE_STALE_JOB_GRACE_SECONDS:-30}
      LOCAL_IMAGE_COMFYUI_BASE_URL: ${LOCAL_IMAGE_COMFYUI_BASE_URL:-}
      LOCAL_IMAGE_COMFYUI_ALLOWED_HOST: ${LOCAL_IMAGE_COMFYUI_ALLOWED_HOST:-}
      LOCAL_IMAGE_COMFYUI_WORKFLOW_PATH: ${LOCAL_IMAGE_COMFYUI_WORKFLOW_PATH:-}
      LOCAL_IMAGE_COMFYUI_CHECKPOINT: ${LOCAL_IMAGE_COMFYUI_CHECKPOINT:-}
      LOCAL_IMAGE_COMFYUI_UNET_NAME: ${LOCAL_IMAGE_COMFYUI_UNET_NAME:-}
      LOCAL_IMAGE_COMFYUI_CLIP_NAME: ${LOCAL_IMAGE_COMFYUI_CLIP_NAME:-}
      LOCAL_IMAGE_COMFYUI_VAE_NAME: ${LOCAL_IMAGE_COMFYUI_VAE_NAME:-}
      LOCAL_IMAGE_COMFYUI_TIMEOUT_SECONDS: ${LOCAL_IMAGE_COMFYUI_TIMEOUT_SECONDS:-}
      LOCAL_IMAGE_COMFYUI_POLL_INTERVAL_SECONDS: ${LOCAL_IMAGE_COMFYUI_POLL_INTERVAL_SECONDS:-}
      LOCAL_IMAGE_COMFYUI_MAX_WAIT_SECONDS: ${LOCAL_IMAGE_COMFYUI_MAX_WAIT_SECONDS:-}
      TTS_LOCAL_HTTP_URL: ${TTS_LOCAL_HTTP_URL:-}
      TTS_API_KEY: ${TTS_API_KEY:-}
      TTS_TOTAL_TIMEOUT_SECONDS: ${TTS_TOTAL_TIMEOUT_SECONDS:-120}
      TTS_STALE_JOB_GRACE_SECONDS: ${TTS_STALE_JOB_GRACE_SECONDS:-30}
      TTS_PROVIDER_TIMEOUT_SECONDS: ${TTS_PROVIDER_TIMEOUT_SECONDS:-30}
      MATRIX_HOMESERVER: ${MATRIX_HOMESERVER:-}
      MATRIX_ACCESS_TOKEN: ${MATRIX_ACCESS_TOKEN:-}
      MATRIX_TIMEOUT_SECONDS: ${MATRIX_TIMEOUT_SECONDS:-30}
      MATRIX_MAX_TEXT_CHARS: ${MATRIX_MAX_TEXT_CHARS:-4000}
      PRINTER_BRIDGE_URL: ${PRINTER_BRIDGE_URL:-}
      PRINTER_BRIDGE_API_KEY: ${PRINTER_BRIDGE_API_KEY:-}
      PRINTER_BRIDGE_TIMEOUT_SECONDS: ${PRINTER_BRIDGE_TIMEOUT_SECONDS:-30}
      PRINTER_MAX_FILE_BYTES: ${PRINTER_MAX_FILE_BYTES:-10485760}
      PRINTER_MAX_COPIES: ${PRINTER_MAX_COPIES:-2}
    ports:
      - "8787:8787"
    volumes:
      - ./config/config.yaml:/app/config/config.yaml:ro
      - ./config/comfyui:/app/config/comfyui:ro
      - ./artifacts:/app/artifacts
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import json, urllib.request; data=json.load(urllib.request.urlopen('http://127.0.0.1:8787/healthz', timeout=3)); raise SystemExit(0 if data.get('ok') else 1)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  home-ai-net:
    external: true
