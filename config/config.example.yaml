server:
  name: home_mcp_gateway
  version: 0.1.0
  host: 127.0.0.1
  port: 8787
  mcp_path: /mcp
  artifact_path: /artifacts

artifacts:
  root: ./artifacts
  public_base_url: http://127.0.0.1:8787/artifacts
  signed_url_secret_env: ARTIFACT_SIGNING_SECRET
  signed_url_ttl_seconds: 300
  retention_days:
    image: 30
    audio: 30
    document: 30
    print: 7
    temp: 1
  max_artifact_bytes: 52428800
  max_inline_artifact_bytes: 5242880

database:
  path: ./artifacts/metadata.sqlite3
  wal: true
  busy_timeout_ms: 5000

limits:
  sync_tool_timeout_seconds: 120
  image_jobs_per_caller_per_day: 20
  tts_jobs_per_caller_per_day: 100
  print_jobs_per_caller_per_day: 20
  max_image_jobs_global: 2
  max_image_jobs_per_caller: 1
  max_tts_jobs_global: 2
  matrix_messages_per_room_per_minute: 5
  max_print_jobs_global: 1

callers:
  host_assistant:
    role: admin
    token_env: GATEWAY_TOKEN_HOST
    shared_artifact_read: true
  role_default:
    role: role_play
    token_env: GATEWAY_TOKEN_ROLE_DEFAULT
    shared_artifact_read: false

policy:
  default_allow: false
  anonymous_allowed_tools:
    - health_check
  high_risk_allowed_callers: {}
  allowed_matrix_rooms: []
  allowed_printers: []
  printable_mime_types:
    - application/pdf
    - image/png
    - image/jpeg
  audio_mime_types:
    - audio/ogg
    - audio/mpeg
    - audio/wav

audit:
  sink: sqlite
  retention_days: 90
  prompt_summary_chars: 200
  log_provider_urls: false

modules:
  localimage:
    enabled: false
    provider: comfyui
    default_size: ${LOCAL_IMAGE_DEFAULT_SIZE}
    allowed_sizes:
      - 512x512
      - 640x640
      - 768x768
      - 896x896
      - 1024x1024
      - 1152x1152
      - 1280x1280
      - 1536x1536
      - 2048x2048
      - 640x480
      - 480x640
      - 800x600
      - 600x800
      - 768x512
      - 512x768
      - 1024x768
      - 768x1024
      - 1280x960
      - 960x1280
      - 1600x1200
      - 1200x1600
      - 1152x768
      - 768x1152
      - 1152x896
      - 896x1152
      - 1216x832
      - 832x1216
      - 1344x768
      - 768x1344
      - 1536x864
      - 864x1536
      - 1536x1024
      - 1024x1536
      - 1920x1280
      - 1280x1920
      - 2048x1536
      - 1536x2048
      - 2304x1536
      - 1536x2304
      - 1280x720
      - 720x1280
      - 1366x768
      - 768x1366
      - 1280x800
      - 800x1280
      - 1440x900
      - 900x1440
      - 1600x900
      - 900x1600
      - 1680x1050
      - 1050x1680
      - 1920x1080
      - 1080x1920
      - 1920x1200
      - 1200x1920
      - 2048x1152
      - 1152x2048
      - 2560x1440
      - 1440x2560
      - 2560x1600
      - 1600x2560
      - 2560x1080
      - 1080x2560
      - 3200x1800
      - 1800x3200
      - 3440x1440
      - 1440x3440
    default_quality: ${LOCAL_IMAGE_DEFAULT_QUALITY}
    allowed_qualities:
      - draft
      - standard
      - high
    default_style: ${LOCAL_IMAGE_DEFAULT_STYLE}
    allowed_styles:
      - default
      - anime
      - realistic
      - illustration
    default_output_format: ${LOCAL_IMAGE_DEFAULT_OUTPUT_FORMAT}
    allowed_output_formats:
      - png
      - jpeg
      - webp
    max_prompt_chars: 4000
    total_timeout_seconds: 900
    stale_job_grace_seconds: 30
    quality_presets:
      draft:
        steps: 12
        cfg: 5.5
        sampler: euler
      standard:
        steps: 24
        cfg: 7.0
        sampler: dpmpp_2m
      high:
        steps: 36
        cfg: 8.0
        sampler: dpmpp_2m
    comfyui:
      base_url: ${LOCAL_IMAGE_COMFYUI_BASE_URL}
      allowed_hosts:
        - ${LOCAL_IMAGE_COMFYUI_ALLOWED_HOST}
      workflow_path: ${LOCAL_IMAGE_COMFYUI_WORKFLOW_PATH}
      checkpoint: ${LOCAL_IMAGE_COMFYUI_CHECKPOINT}
      timeout_seconds: ${LOCAL_IMAGE_COMFYUI_TIMEOUT_SECONDS}
      poll_interval_seconds: ${LOCAL_IMAGE_COMFYUI_POLL_INTERVAL_SECONDS}
      max_wait_seconds: ${LOCAL_IMAGE_COMFYUI_MAX_WAIT_SECONDS}
      node_mappings:
        positive_prompt: "6"
        negative_prompt: "7"
        latent_image: "5"
        sampler: "3"
        save_image: "9"
        checkpoint_loader: "4"
  image:
    enabled: false
    provider: ikun
    default_size: 1920x1080
    allowed_sizes:
      - 1024x1024
      - 1024x1536
      - 1536x1024
      - 1280x720
      - 720x1280
      - 1920x1080
      - 1080x1920
      - 2560x1440
      - 1440x2560
      - 3840x2160
      - 2160x3840
    allowed_qualities:
      - auto
      - low
      - medium
      - high
    allowed_output_formats:
      - png
      - jpeg
      - webp
    max_prompt_chars: 4000
    total_timeout_seconds: 600
    stale_job_grace_seconds: 30
    max_download_bytes: 10485760
    max_edit_input_images: 4
    max_edit_input_image_bytes: 10485760
    max_edit_total_image_bytes: 20971520
    allowed_edit_input_mime_types:
      - image/png
      - image/jpeg
      - image/webp
    allow_http_image_urls: false
    ikun:
      base_url: ${IMAGE_API_BASE_URL}
      model: ${IMAGE_API_MODEL}
      api_key: ${IMAGE_API_KEY}
      timeout_seconds: 60
      # Hosts that may appear in provider response image URLs. Keep this
      # explicit and include CDN/image hosts, not only the provider API host.
      allowed_image_url_hosts:
        - img.opcheiben.cn
  tts:
    enabled: false
    provider: local_http
    default_voice: default
    voices:
      - default
    default_language: ja-JP
    languages:
      - ja-JP
      - en-US
    default_format: wav
    allowed_formats:
      - ogg
      - mp3
      - wav
    allowed_mime_types:
      - audio/ogg
      - audio/mpeg
      - audio/wav
    max_text_chars: 4000
    default_speed: 1.0
    min_speed: 0.5
    max_speed: 2.0
    total_timeout_seconds: 120
    stale_job_grace_seconds: 30
    local_http:
      url: ${TTS_LOCAL_HTTP_URL}
      api_key: ${TTS_API_KEY}
      timeout_seconds: 30
  matrix:
    enabled: false
    homeserver: ${MATRIX_HOMESERVER}
    access_token: ${MATRIX_ACCESS_TOKEN}
    timeout_seconds: 30
    max_text_chars: 4000
  printer:
    enabled: false
    provider: bridge_http
    allowed_printers: []
    allowed_mime_types:
      - application/pdf
      - image/png
      - image/jpeg
    max_file_bytes: 10485760
    max_copies: 2
    default_duplex: none
    duplex_modes:
      - none
      - long_edge
      - short_edge
    default_color: auto
    color_modes:
      - auto
      - color
      - monochrome
    bridge_http:
      url: ${PRINTER_BRIDGE_URL}
      api_key: ${PRINTER_BRIDGE_API_KEY}
      timeout_seconds: 30
