server:
  name: home_mcp_gateway
  version: 0.2.1
  host: ${SERVER_HOST}
  port: ${SERVER_PORT}
  mcp_path: /mcp
  artifact_path: /artifacts

artifacts:
  root: ${ARTIFACT_ROOT}
  public_base_url: ${ARTIFACT_PUBLIC_BASE_URL}
  signed_url_secret_env: ARTIFACT_SIGNING_SECRET
  signed_url_ttl_seconds: ${ARTIFACT_SIGNED_URL_TTL_SECONDS}
  retention_days:
    image: 30
    audio: 30
    document: 30
    print: 7
    temp: 1
  max_artifact_bytes: ${MAX_ARTIFACT_BYTES}
  max_inline_artifact_bytes: ${MAX_INLINE_ARTIFACT_BYTES}

database:
  path: ${DATABASE_PATH}
  wal: true
  busy_timeout_ms: ${DATABASE_BUSY_TIMEOUT_MS}

limits:
  sync_tool_timeout_seconds: ${SYNC_TOOL_TIMEOUT_SECONDS}
  image_jobs_per_caller_per_day: ${IMAGE_JOBS_PER_CALLER_PER_DAY}
  tts_jobs_per_caller_per_day: ${TTS_JOBS_PER_CALLER_PER_DAY}
  print_jobs_per_caller_per_day: ${PRINT_JOBS_PER_CALLER_PER_DAY}
  max_image_jobs_global: ${MAX_IMAGE_JOBS_GLOBAL}
  max_image_jobs_per_caller: ${MAX_IMAGE_JOBS_PER_CALLER}
  max_tts_jobs_global: ${MAX_TTS_JOBS_GLOBAL}
  matrix_messages_per_room_per_minute: ${MATRIX_MESSAGES_PER_ROOM_PER_MINUTE}
  max_print_jobs_global: ${MAX_PRINT_JOBS_GLOBAL}

callers:
  host_assistant:
    role: admin
    token_env: GATEWAY_TOKEN_HOST
    shared_artifact_read: true
  role_default:
    role: role_play
    token_env: GATEWAY_TOKEN_ROLE_DEFAULT
    shared_artifact_read: false

policy:
  default_allow: false
  anonymous_allowed_tools:
    - health_check
  high_risk_allowed_callers:
    agent1:
      - matrix_send_text
      - matrix_send_image
      - matrix_send_audio
    agent2:
      - matrix_send_text
      - matrix_send_image
      - matrix_send_audio
  allowed_matrix_rooms: []
  allowed_printers: []
  printable_mime_types:
    - application/pdf
    - image/png
    - image/jpeg
  audio_mime_types:
    - audio/ogg
    - audio/mpeg
    - audio/wav
  image_mime_types:
    - image/png
    - image/jpeg
    - image/webp

audit:
  sink: sqlite
  retention_days: 90
  prompt_summary_chars: 200
  log_provider_urls: false

modules:
  localimage:
    enabled: false
    provider: comfyui
    default_size: ${LOCAL_IMAGE_DEFAULT_SIZE}
    allowed_sizes:
      - 512x512
      - 640x640
      - 768x768
      - 896x896
      - 1024x1024
      - 1152x1152
      - 1280x1280
      - 1536x1536
      - 2048x2048
      - 640x480
      - 480x640
      - 800x600
      - 600x800
      - 768x512
      - 512x768
      - 1024x768
      - 768x1024
      - 1280x960
      - 960x1280
      - 1600x1200
      - 1200x1600
      - 1152x768
      - 768x1152
      - 1152x896
      - 896x1152
      - 1216x832
      - 832x1216
      - 1344x768
      - 768x1344
      - 1536x864
      - 864x1536
      - 1536x1024
      - 1024x1536
      - 1920x1280
      - 1280x1920
      - 2048x1536
      - 1536x2048
      - 2304x1536
      - 1536x2304
      - 1280x720
      - 720x1280
      - 1366x768
      - 768x1366
      - 1280x800
      - 800x1280
      - 1440x900
      - 900x1440
      - 1600x900
      - 900x1600
      - 1680x1050
      - 1050x1680
      - 1920x1080
      - 1080x1920
      - 1920x1200
      - 1200x1920
      - 2048x1152
      - 1152x2048
      - 2560x1440
      - 1440x2560
      - 2560x1600
      - 1600x2560
      - 2560x1080
      - 1080x2560
      - 3200x1800
      - 1800x3200
      - 3440x1440
      - 1440x3440
    default_quality: ${LOCAL_IMAGE_DEFAULT_QUALITY}
    allowed_qualities:
      - draft
      - standard
      - high
    default_style: ${LOCAL_IMAGE_DEFAULT_STYLE}
    allowed_styles:
      - default
      - anime
      - realistic
      - illustration
    default_output_format: ${LOCAL_IMAGE_DEFAULT_OUTPUT_FORMAT}
    allowed_output_formats:
      - png
      - jpeg
      - webp
    max_prompt_chars: 4000
    total_timeout_seconds: ${LOCAL_IMAGE_TOTAL_TIMEOUT_SECONDS}
    stale_job_grace_seconds: ${LOCAL_IMAGE_STALE_JOB_GRACE_SECONDS}
    quality_presets:
      draft:
        steps: 12
        cfg: 5.5
        sampler: euler
      standard:
        steps: 24
        cfg: 7.0
        sampler: dpmpp_2m
      high:
        steps: 36
        cfg: 8.0
        sampler: dpmpp_2m
    comfyui:
      base_url: ${LOCAL_IMAGE_COMFYUI_BASE_URL}
      allowed_hosts:
        - ${LOCAL_IMAGE_COMFYUI_ALLOWED_HOST}
      workflow_path: ${LOCAL_IMAGE_COMFYUI_WORKFLOW_PATH}
      checkpoint: ${LOCAL_IMAGE_COMFYUI_CHECKPOINT}
      unet_name: ${LOCAL_IMAGE_COMFYUI_UNET_NAME}
      clip_name: ${LOCAL_IMAGE_COMFYUI_CLIP_NAME}
      vae_name: ${LOCAL_IMAGE_COMFYUI_VAE_NAME}
      timeout_seconds: ${LOCAL_IMAGE_COMFYUI_TIMEOUT_SECONDS}
      poll_interval_seconds: ${LOCAL_IMAGE_COMFYUI_POLL_INTERVAL_SECONDS}
      max_wait_seconds: ${LOCAL_IMAGE_COMFYUI_MAX_WAIT_SECONDS}
      node_mappings:
        positive_prompt: "6"
        negative_prompt: "7"
        latent_image: "5"
        sampler: "3"
        save_image: "9"
        checkpoint_loader: "4"
  image:
    enabled: false
    provider: openai_compatible
    default_size: auto
    allowed_sizes:
      - 1024x1024
      - 1024x1536
      - 1536x1024
      - 1280x720
      - 720x1280
      - 1920x1080
      - 1080x1920
      - 2560x1440
      - 1440x2560
      - 3840x2160
      - 2160x3840
    allowed_qualities:
      - auto
      - low
      - medium
      - high
    allowed_output_formats:
      - png
      - jpeg
      - webp
    max_prompt_chars: 4000
    total_timeout_seconds: ${IMAGE_TOTAL_TIMEOUT_SECONDS}
    stale_job_grace_seconds: ${IMAGE_STALE_JOB_GRACE_SECONDS}
    max_download_bytes: ${IMAGE_MAX_DOWNLOAD_BYTES}
    max_edit_input_images: ${IMAGE_MAX_EDIT_INPUT_IMAGES}
    max_edit_input_image_bytes: ${IMAGE_MAX_EDIT_INPUT_IMAGE_BYTES}
    max_edit_total_image_bytes: ${IMAGE_MAX_EDIT_TOTAL_IMAGE_BYTES}
    allowed_edit_input_mime_types:
      - image/png
      - image/jpeg
      - image/webp
    allow_http_image_urls: false
    openai_compatible:
      base_url: ${IMAGE_API_BASE_URL}
      model: ${IMAGE_API_MODEL}
      api_key: ${IMAGE_API_KEY}
      timeout_seconds: ${IMAGE_PROVIDER_TIMEOUT_SECONDS}
      # Hosts that may appear in provider response image URLs. Keep this
      # explicit and include CDN/image hosts, not only the provider API host.
      allowed_image_url_hosts:
        - img.opcheiben.cn
  tts:
    enabled: false
    provider: local_http
    default_voice: default
    voices:
      - default
    default_language: ja-JP
    languages:
      - ja-JP
      - en-US
    default_format: wav
    allowed_formats:
      - ogg
      - mp3
      - wav
    allowed_mime_types:
      - audio/ogg
      - audio/mpeg
      - audio/wav
    max_text_chars: 4000
    default_speed: 1.0
    min_speed: 0.5
    max_speed: 2.0
    total_timeout_seconds: ${TTS_TOTAL_TIMEOUT_SECONDS}
    stale_job_grace_seconds: ${TTS_STALE_JOB_GRACE_SECONDS}
    local_http:
      url: ${TTS_LOCAL_HTTP_URL}
      api_key: ${TTS_API_KEY}
      timeout_seconds: ${TTS_PROVIDER_TIMEOUT_SECONDS}
  matrix:
    enabled: false
    homeserver: ${MATRIX_HOMESERVER}
    # Legacy/default sender token. Used when no caller-specific account matches.
    access_token: ${MATRIX_ACCESS_TOKEN}
    # Recommended for multiple Matrix senders. Add more callers/accounts with:
    # python tools/add_matrix_agent.py agent1 --matrix-access-token <matrix-token>
    caller_accounts: {}
    accounts: {}
    # Example:
    # caller_accounts:
    #   role_default: agent1
    #   agent1: agent1
    #   agent2: agent2
    # accounts:
    #   agent1:
    #     homeserver: ${MATRIX_HOMESERVER}
    #     access_token: ${AGENT1_MATRIX_ACCESS_TOKEN}
    #   agent2:
    #     access_token: ${AGENT2_MATRIX_ACCESS_TOKEN}
    timeout_seconds: ${MATRIX_TIMEOUT_SECONDS}
    max_text_chars: ${MATRIX_MAX_TEXT_CHARS}
    allowed_image_mime_types:
      - image/png
      - image/jpeg
      - image/webp
  printer:
    enabled: false
    provider: bridge_http
    allowed_printers: []
    allowed_mime_types:
      - application/pdf
      - image/png
      - image/jpeg
    max_file_bytes: ${PRINTER_MAX_FILE_BYTES}
    max_copies: ${PRINTER_MAX_COPIES}
    default_duplex: none
    duplex_modes:
      - none
      - long_edge
      - short_edge
    default_color: auto
    color_modes:
      - auto
      - color
      - monochrome
    bridge_http:
      url: ${PRINTER_BRIDGE_URL}
      api_key: ${PRINTER_BRIDGE_API_KEY}
      timeout_seconds: ${PRINTER_BRIDGE_TIMEOUT_SECONDS}
