# User override configuration for local development.
#
# Copy this file to config/user.config.yaml and edit the copied file.
# When CONFIG_PATH is not set, the application automatically loads
# config/user.config.yaml if it exists.
#
#   python -m app.main
#
# The application always loads config/config.example.yaml first. This file only
# overrides the values a normal user is expected to customize.

server:
  host: 127.0.0.1
  port: 8787

artifacts:
  root: ./artifacts
  public_base_url: http://127.0.0.1:8787/artifacts

database:
  path: ./artifacts/metadata.sqlite3

callers:
  host_assistant:
    role: admin
    token_env: GATEWAY_TOKEN_HOST
    shared_artifact_read: true
  role_default:
    role: role_play
    token_env: GATEWAY_TOKEN_ROLE_DEFAULT
    shared_artifact_read: false

policy:
  default_allow: false
  anonymous_allowed_tools:
    - health_check
  high_risk_allowed_callers: {}
  allowed_matrix_rooms: []
  allowed_printers: []

modules:
  image:
    enabled: false
    provider: ikun
    # Set IMAGE_API_BASE_URL, IMAGE_API_MODEL, and IMAGE_API_KEY before enabling.
    # IMAGE_API_BASE_URL must be the API root, for example
    # https://api.monkey-tools.cn, not https://api.monkey-tools.cn/v1/images.
    ikun:
      # Provider response image URL hosts allowed for artifact persistence.
      allowed_image_url_hosts:
        - img.opcheiben.cn
  tts:
    enabled: false
    provider: local_http
    # Set TTS_LOCAL_HTTP_URL before enabling local_http.
  matrix:
    enabled: false
    # Set MATRIX_HOMESERVER and MATRIX_ACCESS_TOKEN before enabling.
  printer:
    enabled: false
    provider: bridge_http
    allowed_printers: []
    # Set PRINTER_BRIDGE_URL before enabling.
